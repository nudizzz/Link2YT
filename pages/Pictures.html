<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Bunker | Pictures & GIFs</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">▶</span>
                <span class="logo-text">SecretBunker</span>
            </a>
            <div class="nav-links">
                <a href="../index.html" class="nav-link">Videos</a>
                <a href="Pictures.html" class="nav-link active">Pictures</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Pictures & GIFs</h1>
            <p class="hero-subtitle">Browse through the sexy collection</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Gallery</h2>
                <p class="section-description">Click any image to view full size</p>
            </div>

            <!-- Picture Grid -->
            <div class="picture-grid" id="pictureGrid">
                <!-- Cards will be populated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
            <img src="" alt="" id="lightboxImg">
            <p class="lightbox-title" id="lightboxTitle"></p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 SecretBunker. All rights reserved.</p>
        </div>
    </footer>

    <script src="../scripts.js"></script>
</body>
</html>
